spring:
    application:
        name: user-service
    cloud:
        function:
             definition: consumeTestEvent
        stream:
            bindings:
                consumeTestEvent-in-0:
                    destination: test-topic
                    group: user-service-group
            kafka:
                binder:
                    brokers: localhost:9092

server:
    port: 8084

management:
  endpoints:
    web:
      exposure:
        include: "*"